<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Salesforce PKCE MCP Chat</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1020;
      --surface: #141b2d;
      --surface-elevated: #1b2640;
      --text: #e4ecff;
      --muted: #9fb2d8;
      --primary: #4f8cff;
      --primary-hover: #6b9eff;
      --success: #2dd4a8;
      --error: #ff6f91;
      --border: #304062;
      --shadow: 0 22px 46px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(circle at top, #182748 0%, var(--bg) 45%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      width: min(900px, 100%);
      background: linear-gradient(180deg, var(--surface-elevated), var(--surface));
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 1.5rem;
      display: grid;
      gap: 1.1rem;
    }

    .heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.3rem, 1.1rem + 1.4vw, 1.8rem);
      letter-spacing: 0.01em;
    }

    .hint {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .status {
      border-radius: 999px;
      border: 1px solid var(--border);
      padding: 0.35rem 0.8rem;
      font-size: 0.8rem;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.03);
    }

    .status--success {
      color: var(--success);
      border-color: color-mix(in srgb, var(--success), transparent 60%);
      background: color-mix(in srgb, var(--success), transparent 88%);
    }

    .status--error {
      color: var(--error);
      border-color: color-mix(in srgb, var(--error), transparent 60%);
      background: color-mix(in srgb, var(--error), transparent 88%);
    }

    .actions {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    button {
      border: 1px solid transparent;
      border-radius: 10px;
      padding: 0.62rem 1rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.2s ease, background-color 0.2s ease;
    }

    button:hover:enabled {
      transform: translateY(-1px);
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 8px 22px rgba(79, 140, 255, 0.35);
    }

    .btn-primary:hover:enabled {
      background: var(--primary-hover);
    }

    .btn-secondary {
      background: transparent;
      color: var(--text);
      border-color: var(--border);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.7;
      transform: none;
    }

    label {
      display: block;
      margin-bottom: 0.45rem;
      font-size: 0.9rem;
      color: var(--muted);
    }

    textarea {
      width: 100%;
      resize: vertical;
      min-height: 140px;
      max-height: 340px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #0f1629;
      color: var(--text);
      padding: 0.85rem;
      font: inherit;
      line-height: 1.4;
    }

    textarea:focus {
      outline: 2px solid color-mix(in srgb, var(--primary), white 30%);
      border-color: transparent;
    }

    pre {
      margin: 0;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #0f1629;
      padding: 1rem;
      min-height: 128px;
      white-space: pre-wrap;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .meta {
      margin-top: -0.4rem;
      color: var(--muted);
      font-size: 0.82rem;
    }

    @media (max-width: 640px) {
      .card { padding: 1rem; }
      .actions { width: 100%; }
      .actions > button { flex: 1; min-width: 140px; }
    }
  </style>
</head>
<body>
  <main class="card">
    <header class="heading">
      <div>
        <h1>Salesforce PKCE MCP Chat</h1>
        <p class="hint">Authenticate, then send a prompt to your MCP agent.</p>
      </div>
      <div id="status" class="status">Not authenticated</div>
    </header>

    <div class="actions">
      <button id="authButton" type="button" class="btn-primary">Connect Salesforce</button>
      <button id="sendButton" type="button" class="btn-secondary">Send Prompt</button>
    </div>

    <div>
      <label for="message">Message</label>
      <textarea id="message" placeholder="Ask your Salesforce MCP agent..."></textarea>
      <div class="meta">Tip: Press Ctrl/Cmd + Enter to send quickly.</div>
    </div>

    <pre id="output">Ready for input.</pre>
  </main>

  <script type="module" src="/app.js"></script>
</body>
</html>
