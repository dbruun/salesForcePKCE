<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Salesforce PKCE MCP Chat</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; max-width: 820px; }
    .row { margin-bottom: 1rem; }
    textarea { width: 100%; height: 110px; }
    button { padding: 0.5rem 1rem; }
    pre { background: #f5f5f5; padding: 1rem; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>Salesforce PKCE MCP Chat</h1>
  <div class="row">
    <button id="authButton">Start Salesforce PKCE Login</button>
  </div>
  <div class="row">
    <label for="message">Message</label>
    <textarea id="message" placeholder="Ask your Salesforce MCP agent..."></textarea>
  </div>
  <div class="row">
    <button id="sendButton">Send</button>
  </div>
  <pre id="output"></pre>

  <script>
    const output = document.getElementById('output');

    document.getElementById('authButton').addEventListener('click', async () => {
      const response = await fetch('/api/auth/salesforce/start');
      const data = await response.json();
      window.location.href = data.authorizationUrl;
    });

    document.getElementById('sendButton').addEventListener('click', async () => {
      const message = document.getElementById('message').value;
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message })
      });

      const data = await response.json();
      output.textContent = data.message ?? JSON.stringify(data, null, 2);
    });
  </script>
</body>
</html>
